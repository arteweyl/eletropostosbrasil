name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Permissões necessárias para autenticação e deploy no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante apenas um deploy ativo concorrente por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1. Integração Contínua (CI): Executa a suíte de testes unitários
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Executar Testes Unitários
        run: python3 -m unittest tests/test_utils.py

  # 2. Deploy Contínuo (CD): Recompila dados e faz deploy no Pages
  cd:
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compilar Dados do Dashboard
        run: python3 run_etl.py --compile

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Preparar Artefatos Estáticos
        run: |
          mkdir -p dist/data
          cp index.html dist/
          cp data/eletropostos_data.js dist/data/

      - name: Upload de Artefato para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
